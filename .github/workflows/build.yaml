# Build and push the 3D-game image to the private registry,
# then trigger deploy.yaml.
#
# Required GitHub variables (Settings → Variables → Actions):
#   REGISTRY_HOST    — e.g. registry.nadoma.net
#   REGISTRY_USER    — registry login user
#
# Required GitHub secrets:
#   REGISTRY_PASSWORD — registry login password

name: Build and Push Image

on:
  push:
    branches: [main]
    paths:
      - '.github/workflows/build.yaml'
      - '.github/workflows/deploy.yaml'
      - 'src/**'
      - 'index.html'
      - 'package.json'
      - 'package-lock.json'
      - 'Dockerfile'
      - 'docker-compose.yaml'
      - 'docker-compose.deploy.yaml'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      actions: write
    env:
      STACK_NAME: 3d-game
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set variables
        id: vars
        run: |
          echo "IMAGE_TAG=$(echo ${{ github.sha }} | cut -c1-8)" >> $GITHUB_OUTPUT
          echo "IMAGE_URL=${{ vars.REGISTRY_HOST }}/${{ env.STACK_NAME }}" >> $GITHUB_OUTPUT

          {
            echo "### Built Image :tractor:"
            echo ""
            echo "**Commit:** \`${{ github.sha }}\`"
          } >> $GITHUB_STEP_SUMMARY

      - name: Login to registry
        uses: docker/login-action@v3
        with:
          registry: ${{ vars.REGISTRY_HOST }}
          username: ${{ vars.REGISTRY_USER }}
          password: ${{ secrets.REGISTRY_PASSWORD }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build and push
        run: |
          IMAGE_NAME="${{ steps.vars.outputs.IMAGE_URL }}:${{ steps.vars.outputs.IMAGE_TAG }}"
          CACHE_IMAGE="${{ steps.vars.outputs.IMAGE_URL }}:buildcache"
          docker buildx build \
            --platform linux/amd64 \
            --cache-from type=registry,ref=$CACHE_IMAGE \
            --cache-to type=registry,ref=$CACHE_IMAGE,mode=max \
            --push \
            -t "$IMAGE_NAME" \
            -t "${{ steps.vars.outputs.IMAGE_URL }}:latest" \
            .
          echo "- Image: \`$IMAGE_NAME\`" >> $GITHUB_STEP_SUMMARY

      - name: Trigger deployment
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh workflow run deploy.yaml \
            --ref ${{ github.ref }} \
            -f image_tag="${{ steps.vars.outputs.IMAGE_TAG }}"
