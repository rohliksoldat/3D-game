<!DOCTYPE html>
<html lang="cs">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>3D FPS</title>
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      html, body { width: 100%; height: 100%; overflow: hidden; background: #000; color: #fff; font-family: system-ui, -apple-system, sans-serif; }
      #app { position: relative; width: 100vw; height: 100vh; }
      canvas { display: block; }

      #crosshair {
        position: absolute; top: 50%; left: 50%;
        width: 20px; height: 20px;
        transform: translate(-50%, -50%);
        pointer-events: none;
      }
      #crosshair::before, #crosshair::after {
        content: ""; position: absolute; background: #fff; opacity: 0.85;
      }
      #crosshair::before { left: 50%; top: 0; width: 2px; height: 100%; transform: translateX(-50%); }
      #crosshair::after  { top: 50%; left: 0; height: 2px; width: 100%; transform: translateY(-50%); }

      #hud {
        position: absolute; top: 16px; left: 16px;
        font-size: 18px; font-weight: 600;
        text-shadow: 0 2px 6px rgba(0,0,0,0.7);
        line-height: 1.5;
      }
      #hud .label { opacity: 0.7; font-weight: 400; margin-right: 6px; }

      #menu {
        position: absolute; inset: 0;
        background: rgba(0,0,0,0.75);
        display: flex; flex-direction: column; align-items: center; justify-content: center;
        gap: 18px; text-align: center; padding: 32px;
      }
      #menu h1 { font-size: 44px; letter-spacing: 1px; }
      #menu p  { opacity: 0.85; max-width: 480px; line-height: 1.55; }
      #menu kbd {
        background: #222; border: 1px solid #444; border-radius: 4px;
        padding: 2px 6px; font-family: ui-monospace, monospace; font-size: 14px;
      }
      #menu button {
        background: #ff5252; color: white; border: 0;
        padding: 14px 28px; font-size: 18px; font-weight: 600;
        border-radius: 8px; cursor: pointer; margin-top: 8px;
      }
      #menu button:hover { background: #ff7070; }
      #menu.hidden { display: none; }

      #gameOver { color: #ff8a8a; font-size: 22px; font-weight: 600; }
      #gameOver.hidden { display: none; }
    </style>
  </head>
  <body>
    <div id="app">
      <div id="crosshair"></div>

      <div id="hud">
        <div><span class="label">Skóre:</span><span id="score">0</span></div>
        <div><span class="label">Životy:</span><span id="health">100</span></div>
        <div><span class="label">Nepřátelé:</span><span id="enemies">0</span></div>
      </div>

      <div id="menu">
        <h1>3D FPS</h1>
        <p id="gameOver" class="hidden">Konec hry!</p>
        <p>
          Pohyb: <kbd>W</kbd> <kbd>A</kbd> <kbd>S</kbd> <kbd>D</kbd> &nbsp;·&nbsp;
          Skok: <kbd>Space</kbd> &nbsp;·&nbsp;
          Mířit: myš &nbsp;·&nbsp;
          Střelba: <kbd>LMB</kbd>
        </p>
        <p>Klikni níže pro start. Stiskni <kbd>Esc</kbd> pro pauzu.</p>
        <button id="startBtn">Hrát</button>
      </div>
    </div>

    <script type="module" src="/src/main.js"></script>
  </body>
</html>
