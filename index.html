<!DOCTYPE html>
<html lang="cs">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>3D FPS</title>
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      html, body { width: 100%; height: 100%; overflow: hidden; background: #000; color: #fff; font-family: system-ui, -apple-system, sans-serif; }
      #app { position: relative; width: 100vw; height: 100vh; }
      canvas { display: block; }

      #crosshair {
        position: absolute; top: 50%; left: 50%;
        width: 20px; height: 20px;
        transform: translate(-50%, -50%);
        pointer-events: none;
      }
      #crosshair::before, #crosshair::after {
        content: ""; position: absolute; background: #fff; opacity: 0.85;
      }
      #crosshair::before { left: 50%; top: 0; width: 2px; height: 100%; transform: translateX(-50%); }
      #crosshair::after  { top: 50%; left: 0; height: 2px; width: 100%; transform: translateY(-50%); }

      #hud {
        position: absolute; top: 16px; left: 16px;
        font-size: 18px; font-weight: 600;
        text-shadow: 0 2px 6px rgba(0,0,0,0.7);
        line-height: 1.5;
      }
      #hud .label { opacity: 0.7; font-weight: 400; margin-right: 6px; }

      #menu {
        position: absolute; inset: 0;
        background: rgba(0,0,0,0.75);
        display: flex; flex-direction: column; align-items: center; justify-content: center;
        gap: 18px; text-align: center; padding: 32px;
      }
      #menu h1 { font-size: 44px; letter-spacing: 1px; }
      #menu p  { opacity: 0.85; max-width: 480px; line-height: 1.55; }
      #menu kbd {
        background: #222; border: 1px solid #444; border-radius: 4px;
        padding: 2px 6px; font-family: ui-monospace, monospace; font-size: 14px;
      }
      #menu button, #settings button {
        background: #ff5252; color: white; border: 0;
        padding: 12px 24px; font-size: 16px; font-weight: 600;
        border-radius: 8px; cursor: pointer;
      }
      #menu button:hover, #settings button:hover { background: #ff7070; }
      #menu .btn-secondary, #settings .btn-secondary {
        background: #333; color: #fff;
      }
      #menu .btn-secondary:hover, #settings .btn-secondary:hover { background: #555; }
      #menu .btn-row { display: flex; gap: 12px; margin-top: 8px; }
      #menu.hidden { display: none; }

      #gameOver { color: #ff8a8a; font-size: 22px; font-weight: 600; }
      #gameOver.hidden { display: none; }

      #settings {
        position: absolute; inset: 0;
        background: rgba(0,0,0,0.85);
        display: flex; flex-direction: column; align-items: center; justify-content: center;
        gap: 18px; padding: 32px;
      }
      #settings.hidden { display: none; }
      #settings h2 { font-size: 32px; margin-bottom: 8px; }
      #settings .setting {
        display: grid; grid-template-columns: 160px 240px 60px;
        align-items: center; gap: 16px;
        width: 100%; max-width: 480px;
      }
      #settings label { font-size: 16px; opacity: 0.9; }
      #settings input[type=range] { width: 100%; }
      #settings .value {
        font-family: ui-monospace, monospace;
        text-align: right;
        font-size: 15px;
        opacity: 0.85;
      }
    </style>
  </head>
  <body>
    <div id="app">
      <div id="crosshair"></div>

      <div id="hud">
        <div><span class="label">Skóre:</span><span id="score">0</span></div>
        <div><span class="label">Životy:</span><span id="health">100</span></div>
        <div><span class="label">Nepřátelé:</span><span id="enemies">0</span></div>
      </div>

      <div id="menu">
        <h1>3D FPS</h1>
        <p id="gameOver" class="hidden">Konec hry!</p>
        <p>
          Pohyb: <kbd>W</kbd> <kbd>A</kbd> <kbd>S</kbd> <kbd>D</kbd> &nbsp;·&nbsp;
          Skok: <kbd>Space</kbd> &nbsp;·&nbsp;
          Mířit: myš &nbsp;·&nbsp;
          Střelba: <kbd>LMB</kbd>
        </p>
        <p>Klikni níže pro start. Stiskni <kbd>Esc</kbd> pro pauzu.</p>
        <div class="btn-row">
          <button id="startBtn">Hrát</button>
          <button id="settingsBtn" class="btn-secondary">Nastavení</button>
        </div>
      </div>

      <div id="settings" class="hidden">
        <h2>Nastavení</h2>
        <div class="setting">
          <label for="fovInput">FOV</label>
          <input id="fovInput" type="range" min="30" max="120" step="1" />
          <span class="value" id="fovValue">75</span>
        </div>
        <div class="setting">
          <label for="sensInput">Citlivost myši</label>
          <input id="sensInput" type="range" min="0.2" max="3" step="0.05" />
          <span class="value" id="sensValue">1.00</span>
        </div>
        <div class="setting">
          <label for="volInput">Hlasitost</label>
          <input id="volInput" type="range" min="0" max="1" step="0.01" />
          <span class="value" id="volValue">50%</span>
        </div>
        <button id="settingsBack" class="btn-secondary">Zpět</button>
      </div>
    </div>

    <script type="module" src="/src/main.js"></script>
  </body>
</html>
